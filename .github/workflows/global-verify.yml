name: Global Verify

on:
  workflow_call:
  push:
    branches:
      - "main"
    paths:
      - "package.json"
      - "bun.lock"
      - "cli/**"
      - "openclaw-plugin/**"
      - "protocol/**"
      - "realtime/**"
      - "script/codex/**"
      - "web/**"
      - ".github/workflows/global-verify.yml"
      - ".github/workflows/release.yml"
  pull_request:
    branches:
      - "main"
    paths:
      - "package.json"
      - "bun.lock"
      - "cli/**"
      - "openclaw-plugin/**"
      - "protocol/**"
      - "realtime/**"
      - "script/codex/**"
      - "web/**"
      - ".github/workflows/global-verify.yml"
      - ".github/workflows/release.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: oven-sh/setup-bun@v2
      - run: bun install --frozen-lockfile
      - run: bun run fmt:ts:check
      - run: bun run lint:ts
