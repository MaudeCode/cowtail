name: Realtime Verify

on:
  workflow_call:
  push:
    branches:
      - "main"
    paths:
      - "package.json"
      - "bun.lock"
      - "protocol/**"
      - "realtime/**"
      - "web/convex/**"
      - ".github/workflows/realtime-verify.yml"
      - ".github/workflows/release.yml"
  pull_request:
    branches:
      - "main"
    paths:
      - "package.json"
      - "bun.lock"
      - "protocol/**"
      - "realtime/**"
      - "web/convex/**"
      - ".github/workflows/realtime-verify.yml"
      - ".github/workflows/release.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: oven-sh/setup-bun@v2
      - run: bun install --frozen-lockfile
      - run: bun test protocol/src/openclaw.test.ts
      - run: bun test web/convex/authSessions.test.ts web/convex/openclaw.test.ts web/convex/roundup.test.ts
      - run: bun run check:protocol
      - run: cd web && bunx tsc -p convex/tsconfig.json --noEmit
      - run: bun run check:realtime
      - run: bun run test:realtime
