name: Release

on:
  push:
    tags:
      - 'v*'

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: maudecode/cowtail

jobs:
  docker-build:
    uses: ./.github/workflows/docker-build.yml

  publish:
    name: Publish
    runs-on: ubuntu-latest
    needs: [docker-build]
    permissions:
      contents: write
      packages: write
    steps:
      - uses: actions/checkout@v6

      - name: Download Docker amd64
        uses: actions/download-artifact@v8
        with:
          name: docker-amd64
          path: docker-amd64

      - name: Download Docker arm64
        uses: actions/download-artifact@v8
        with:
          name: docker-arm64
          path: docker-arm64

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to Container Registry
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=match,pattern=v(.*),group=1
            type=raw,value=latest

      - name: Load and push amd64
        run: |
          docker load -i docker-amd64/image.tar
          IMAGE_ID=$(docker images --format '{{.ID}}' | head -1)
          docker tag $IMAGE_ID ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:amd64-${{ github.ref_name }}
          docker push ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:amd64-${{ github.ref_name }}

      - name: Load and push arm64
        run: |
          docker load -i docker-arm64/image.tar
          IMAGE_ID=$(docker images --format '{{.ID}}' | head -1)
          docker tag $IMAGE_ID ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:arm64-${{ github.ref_name }}
          docker push ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:arm64-${{ github.ref_name }}

      - name: Create and push multi-arch manifest
        run: |
          for tag in $(echo '${{ steps.meta.outputs.tags }}' | tr ',' '\n'); do
            docker buildx imagetools create -t $tag \
              ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:amd64-${{ github.ref_name }} \
              ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:arm64-${{ github.ref_name }}
          done

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          generate_release_notes: true
