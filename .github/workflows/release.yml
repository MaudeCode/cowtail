name: Release

on:
  push:
    tags:
      - "v*"

env:
  REGISTRY: ghcr.io
  WEB_IMAGE_NAME: maudecode/cowtail
  REALTIME_IMAGE_NAME: maudecode/cowtail-realtime

jobs:
  global-verify:
    uses: ./.github/workflows/global-verify.yml

  web-verify:
    uses: ./.github/workflows/web-verify.yml

  realtime-verify:
    uses: ./.github/workflows/realtime-verify.yml

  openclaw-plugin-verify:
    uses: ./.github/workflows/openclaw-plugin-verify.yml

  cli-verify:
    uses: ./.github/workflows/cli-verify.yml
    with:
      version: ${{ github.ref_name }}

  web-docker-build:
    needs:
      - global-verify
      - web-verify
      - realtime-verify
      - openclaw-plugin-verify
      - cli-verify
    uses: ./.github/workflows/docker-build.yml
    with:
      version: ${{ github.ref_name }}

  realtime-docker-build:
    needs:
      - global-verify
      - web-verify
      - realtime-verify
      - openclaw-plugin-verify
      - cli-verify
    uses: ./.github/workflows/docker-build.yml
    with:
      version: ${{ github.ref_name }}
      dockerfile: realtime/Dockerfile
      artifact_prefix: realtime-docker
      image_name: cowtail-realtime

  cli-build:
    needs:
      - global-verify
      - web-verify
      - realtime-verify
      - openclaw-plugin-verify
      - cli-verify
    uses: ./.github/workflows/cli-build.yml
    with:
      version: ${{ github.ref_name }}

  openclaw-plugin-build:
    needs:
      - global-verify
      - web-verify
      - realtime-verify
      - openclaw-plugin-verify
      - cli-verify
    uses: ./.github/workflows/openclaw-plugin-build.yml
    with:
      version: ${{ github.ref_name }}

  validate:
    name: Validate Artifacts
    runs-on: blacksmith-4vcpu-ubuntu-2404
    needs:
      - global-verify
      - web-verify
      - realtime-verify
      - openclaw-plugin-verify
      - cli-verify
      - web-docker-build
      - realtime-docker-build
      - cli-build
      - openclaw-plugin-build
    steps:
      - name: Download web Docker amd64
        uses: actions/download-artifact@v8
        with:
          name: docker-amd64
          path: docker-amd64

      - name: Download web Docker arm64
        uses: actions/download-artifact@v8
        with:
          name: docker-arm64
          path: docker-arm64

      - name: Download realtime Docker amd64
        uses: actions/download-artifact@v8
        with:
          name: realtime-docker-amd64
          path: realtime-docker-amd64

      - name: Download realtime Docker arm64
        uses: actions/download-artifact@v8
        with:
          name: realtime-docker-arm64
          path: realtime-docker-arm64

      - name: Download CLI release artifacts
        uses: actions/download-artifact@v8
        with:
          name: cli-release
          path: cli-release

      - name: Download CLI npm package
        uses: actions/download-artifact@v8
        with:
          name: cli-npm-package
          path: cli-npm-package

      - name: Download OpenClaw plugin npm package
        uses: actions/download-artifact@v8
        with:
          name: openclaw-plugin-npm-package
          path: openclaw-plugin-npm-package

      - name: Verify artifacts exist
        run: |
          test -s docker-amd64/image.tar
          test -s docker-arm64/image.tar
          test -s realtime-docker-amd64/image.tar
          test -s realtime-docker-arm64/image.tar
          test -s cli-release/cowtail-darwin-arm64.tar.gz
          test -s cli-release/cowtail-darwin-x64.tar.gz
          test -s cli-release/cowtail-linux-arm64.tar.gz
          test -s cli-release/cowtail-linux-x64.tar.gz
          test -s cli-npm-package/*.tgz
          test -s openclaw-plugin-npm-package/*.tgz
          tar -tf docker-amd64/image.tar > /dev/null
          tar -tf docker-arm64/image.tar > /dev/null
          tar -tf realtime-docker-amd64/image.tar > /dev/null
          tar -tf realtime-docker-arm64/image.tar > /dev/null
          tar -tzf cli-npm-package/*.tgz > /dev/null
          tar -tzf openclaw-plugin-npm-package/*.tgz > /dev/null

  publish:
    name: Publish
    runs-on: ubuntu-latest
    needs: [validate]
    permissions:
      contents: write
      packages: write
      id-token: write
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Download web Docker amd64
        uses: actions/download-artifact@v8
        with:
          name: docker-amd64
          path: docker-amd64

      - name: Download web Docker arm64
        uses: actions/download-artifact@v8
        with:
          name: docker-arm64
          path: docker-arm64

      - name: Download realtime Docker amd64
        uses: actions/download-artifact@v8
        with:
          name: realtime-docker-amd64
          path: realtime-docker-amd64

      - name: Download realtime Docker arm64
        uses: actions/download-artifact@v8
        with:
          name: realtime-docker-arm64
          path: realtime-docker-arm64

      - name: Download CLI release artifacts
        uses: actions/download-artifact@v8
        with:
          name: cli-release
          path: cli-release

      - name: Download CLI npm package
        uses: actions/download-artifact@v8
        with:
          name: cli-npm-package
          path: cli-npm-package

      - name: Download OpenClaw plugin npm package
        uses: actions/download-artifact@v8
        with:
          name: openclaw-plugin-npm-package
          path: openclaw-plugin-npm-package

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          registry-url: "https://registry.npmjs.org"

      - name: Publish OpenClaw plugin to npm
        run: |
          tarball="$(realpath "$(ls openclaw-plugin-npm-package/*.tgz)")"
          echo "Publishing ${tarball}"
          npm publish "${tarball}" --provenance --access public --tag latest

      - name: Publish CLI to npm
        run: |
          tarball="$(realpath "$(ls cli-npm-package/*.tgz)")"
          echo "Publishing ${tarball}"
          npm publish "${tarball}" --provenance --access public --tag latest

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to Container Registry
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract web metadata
        id: meta-web
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.REGISTRY }}/${{ env.WEB_IMAGE_NAME }}
          tags: |
            type=match,pattern=v(.*),group=1
            type=raw,value=latest

      - name: Extract realtime metadata
        id: meta-realtime
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.REGISTRY }}/${{ env.REALTIME_IMAGE_NAME }}
          tags: |
            type=match,pattern=v(.*),group=1
            type=raw,value=latest

      - name: Load and push architecture images
        run: |
          load_and_push() {
            artifact_dir="$1"
            image_name="$2"
            arch="$3"
            load_output="$(docker load -i "${artifact_dir}/image.tar")"
            printf '%s\n' "$load_output"
            image_ref="$(printf '%s\n' "$load_output" | awk -F': ' '/Loaded image/{ref=$2} END{print ref}')"
            test -n "$image_ref"
            tag="${{ env.REGISTRY }}/${image_name}:${arch}-${{ github.ref_name }}"
            docker tag "$image_ref" "$tag"
            docker push "$tag"
          }

          load_and_push docker-amd64 "${{ env.WEB_IMAGE_NAME }}" amd64
          load_and_push docker-arm64 "${{ env.WEB_IMAGE_NAME }}" arm64
          load_and_push realtime-docker-amd64 "${{ env.REALTIME_IMAGE_NAME }}" amd64
          load_and_push realtime-docker-arm64 "${{ env.REALTIME_IMAGE_NAME }}" arm64

      - name: Create and push web multi-arch manifest
        run: |
          printf '%s\n' '${{ steps.meta-web.outputs.tags }}' | tr ',' '\n' | while IFS= read -r tag; do
            test -n "$tag"
            docker buildx imagetools create -t $tag \
              ${{ env.REGISTRY }}/${{ env.WEB_IMAGE_NAME }}:amd64-${{ github.ref_name }} \
              ${{ env.REGISTRY }}/${{ env.WEB_IMAGE_NAME }}:arm64-${{ github.ref_name }}
          done

      - name: Create and push realtime multi-arch manifest
        run: |
          printf '%s\n' '${{ steps.meta-realtime.outputs.tags }}' | tr ',' '\n' | while IFS= read -r tag; do
            test -n "$tag"
            docker buildx imagetools create -t $tag \
              ${{ env.REGISTRY }}/${{ env.REALTIME_IMAGE_NAME }}:amd64-${{ github.ref_name }} \
              ${{ env.REGISTRY }}/${{ env.REALTIME_IMAGE_NAME }}:arm64-${{ github.ref_name }}
          done

      - name: Generate CLI checksums
        run: |
          cd cli-release
          shasum -a 256 *.tar.gz > checksums.txt

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          generate_release_notes: true
          files: |
            cli-release/cowtail-darwin-arm64.tar.gz
            cli-release/cowtail-darwin-x64.tar.gz
            cli-release/cowtail-linux-arm64.tar.gz
            cli-release/cowtail-linux-x64.tar.gz
            cli-release/checksums.txt
            cli-npm-package/*.tgz
            openclaw-plugin-npm-package/*.tgz
