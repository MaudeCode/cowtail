name: Release

on:
  push:
    tags:
      - "v*"

env:
  REGISTRY: ghcr.io
  WEB_IMAGE_NAME: maudecode/cowtail
  REALTIME_IMAGE_NAME: maudecode/cowtail-realtime

jobs:
  global-verify:
    uses: ./.github/workflows/global-verify.yml

  web-verify:
    uses: ./.github/workflows/web-verify.yml

  realtime-verify:
    uses: ./.github/workflows/realtime-verify.yml

  openclaw-plugin-verify:
    uses: ./.github/workflows/openclaw-plugin-verify.yml

  ios-verify:
    uses: ./.github/workflows/ios-verify.yml

  cli-verify:
    uses: ./.github/workflows/cli-verify.yml
    with:
      version: ${{ github.ref_name }}

  web-docker-build:
    needs:
      - global-verify
      - web-verify
      - realtime-verify
      - openclaw-plugin-verify
      - ios-verify
      - cli-verify
    uses: ./.github/workflows/docker-build.yml
    with:
      version: ${{ github.ref_name }}

  realtime-docker-build:
    needs:
      - global-verify
      - web-verify
      - realtime-verify
      - openclaw-plugin-verify
      - ios-verify
      - cli-verify
    uses: ./.github/workflows/docker-build.yml
    with:
      version: ${{ github.ref_name }}
      dockerfile: realtime/Dockerfile
      artifact_prefix: realtime-docker
      image_name: cowtail-realtime

  cli-build:
    needs:
      - global-verify
      - web-verify
      - realtime-verify
      - openclaw-plugin-verify
      - ios-verify
      - cli-verify
    uses: ./.github/workflows/cli-build.yml
    with:
      version: ${{ github.ref_name }}

  openclaw-plugin-build:
    needs:
      - global-verify
      - web-verify
      - realtime-verify
      - openclaw-plugin-verify
      - ios-verify
      - cli-verify
    uses: ./.github/workflows/openclaw-plugin-build.yml
    with:
      version: ${{ github.ref_name }}

  ios-build:
    needs:
      - global-verify
      - web-verify
      - realtime-verify
      - openclaw-plugin-verify
      - ios-verify
      - cli-verify
    uses: ./.github/workflows/ios-build.yml
    with:
      version: ${{ github.ref_name }}
    secrets: inherit

  validate:
    name: Validate Artifacts
    runs-on: blacksmith-4vcpu-ubuntu-2404
    needs:
      - global-verify
      - web-verify
      - realtime-verify
      - openclaw-plugin-verify
      - ios-verify
      - cli-verify
      - web-docker-build
      - realtime-docker-build
      - cli-build
      - openclaw-plugin-build
      - ios-build
    steps:
      - name: Download web Docker amd64
        uses: actions/download-artifact@v8
        with:
          name: docker-amd64
          path: docker-amd64

      - name: Download web Docker arm64
        uses: actions/download-artifact@v8
        with:
          name: docker-arm64
          path: docker-arm64

      - name: Download realtime Docker amd64
        uses: actions/download-artifact@v8
        with:
          name: realtime-docker-amd64
          path: realtime-docker-amd64

      - name: Download realtime Docker arm64
        uses: actions/download-artifact@v8
        with:
          name: realtime-docker-arm64
          path: realtime-docker-arm64

      - name: Download CLI release artifacts
        uses: actions/download-artifact@v8
        with:
          name: cli-release
          path: cli-release

      - name: Download CLI npm package
        uses: actions/download-artifact@v8
        with:
          name: cli-npm-package
          path: cli-npm-package

      - name: Download OpenClaw plugin npm package
        uses: actions/download-artifact@v8
        with:
          name: openclaw-plugin-npm-package
          path: openclaw-plugin-npm-package

      - name: Download iOS IPA
        uses: actions/download-artifact@v8
        with:
          name: ios-ipa
          path: ios-ipa

      - name: Resolve iOS IPA path
        id: ios-ipa
        run: |
          ipa_path="$(find ios-ipa -maxdepth 1 -name '*.ipa' -type f | head -n 1)"
          test -n "${ipa_path}"
          echo "path=${ipa_path}" >> "${GITHUB_OUTPUT}"

      - name: Download iOS symbols
        uses: actions/download-artifact@v8
        with:
          name: ios-dsyms
          path: ios-dsyms

      - name: Verify artifacts exist
        run: |
          test -s docker-amd64/image.tar
          test -s docker-arm64/image.tar
          test -s realtime-docker-amd64/image.tar
          test -s realtime-docker-arm64/image.tar
          test -s cli-release/cowtail-darwin-arm64.tar.gz
          test -s cli-release/cowtail-darwin-x64.tar.gz
          test -s cli-release/cowtail-linux-arm64.tar.gz
          test -s cli-release/cowtail-linux-x64.tar.gz
          test -s cli-npm-package/*.tgz
          test -s openclaw-plugin-npm-package/*.tgz
          test -s ios-ipa/*.ipa
          test -d ios-dsyms
          tar -tf docker-amd64/image.tar > /dev/null
          tar -tf docker-arm64/image.tar > /dev/null
          tar -tf realtime-docker-amd64/image.tar > /dev/null
          tar -tf realtime-docker-arm64/image.tar > /dev/null
          tar -tzf cli-npm-package/*.tgz > /dev/null
          tar -tzf openclaw-plugin-npm-package/*.tgz > /dev/null

  publish-ios:
    name: Publish iOS App
    runs-on: ubuntu-latest
    needs: [validate]
    permissions:
      contents: read
    steps:
      - name: Download iOS IPA
        uses: actions/download-artifact@v8
        with:
          name: ios-ipa
          path: ios-ipa

      - name: Resolve iOS IPA path
        id: ios-ipa
        run: |
          ipa_path="$(find ios-ipa -maxdepth 1 -name '*.ipa' -type f | head -n 1)"
          test -n "${ipa_path}"
          echo "path=${ipa_path}" >> "${GITHUB_OUTPUT}"

      - name: Upload iOS app to TestFlight
        uses: apple-actions/upload-testflight-build@v4
        with:
          app-path: ${{ steps.ios-ipa.outputs.path }}
          app-type: ios
          issuer-id: ${{ secrets.APP_STORE_CONNECT_ISSUER_ID }}
          api-key-id: ${{ secrets.APP_STORE_CONNECT_KEY_ID }}
          api-private-key: ${{ secrets.APP_STORE_CONNECT_PRIVATE_KEY }}
          uses-non-exempt-encryption: "false"
          wait-for-processing: "true"
          backend: AppStoreAPI

  publish-npm:
    name: Publish ${{ matrix.name }} to npm
    runs-on: ubuntu-latest
    needs: [validate]
    permissions:
      contents: read
      id-token: write
    strategy:
      fail-fast: true
      matrix:
        include:
          - name: CLI
            artifact: cli-npm-package
            path: cli-npm-package
          - name: OpenClaw plugin
            artifact: openclaw-plugin-npm-package
            path: openclaw-plugin-npm-package
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: "24"
          registry-url: "https://registry.npmjs.org"

      - name: Download npm package
        uses: actions/download-artifact@v8
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.path }}

      - name: Publish npm package
        run: |
          tarball="$(realpath "$(ls "${{ matrix.path }}"/*.tgz)")"
          echo "Publishing ${tarball}"
          npm publish "${tarball}" --provenance --access public --tag latest

  publish-images:
    name: Publish ${{ matrix.name }} Image (${{ matrix.arch }})
    runs-on: ubuntu-latest
    needs: [validate]
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: true
      matrix:
        include:
          - name: Web
            artifact_prefix: docker
            image_name: maudecode/cowtail
            arch: amd64
          - name: Realtime
            artifact_prefix: realtime-docker
            image_name: maudecode/cowtail-realtime
            arch: amd64
          - name: Web
            artifact_prefix: docker
            image_name: maudecode/cowtail
            arch: arm64
          - name: Realtime
            artifact_prefix: realtime-docker
            image_name: maudecode/cowtail-realtime
            arch: arm64
    steps:
      - name: Download image
        uses: actions/download-artifact@v8
        with:
          name: ${{ matrix.artifact_prefix }}-${{ matrix.arch }}
          path: ${{ matrix.artifact_prefix }}-${{ matrix.arch }}

      - name: Log in to Container Registry
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Load and push architecture image
        run: |
          artifact_dir="${{ matrix.artifact_prefix }}-${{ matrix.arch }}"
          load_output="$(docker load -i "${artifact_dir}/image.tar")"
          printf '%s\n' "$load_output"
          image_ref="$(printf '%s\n' "$load_output" | awk -F': ' '/Loaded image/{ref=$2} END{print ref}')"
          test -n "$image_ref"
          tag="${{ env.REGISTRY }}/${{ matrix.image_name }}:${{ matrix.arch }}-${{ github.ref_name }}"
          docker tag "$image_ref" "$tag"
          docker push "$tag"

  publish-image-manifests:
    name: Publish ${{ matrix.name }} Image Manifest
    runs-on: ubuntu-latest
    needs: [publish-images]
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: true
      matrix:
        include:
          - name: Web
            image_name: maudecode/cowtail
          - name: Realtime
            image_name: maudecode/cowtail-realtime
    steps:
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to Container Registry
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract image metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.REGISTRY }}/${{ matrix.image_name }}
          tags: |
            type=match,pattern=v(.*),group=1
            type=raw,value=latest

      - name: Create and push multi-arch manifest
        run: |
          printf '%s\n' '${{ steps.meta.outputs.tags }}' | tr ',' '\n' | while IFS= read -r tag; do
            test -n "$tag"
            docker buildx imagetools create -t "$tag" \
              ${{ env.REGISTRY }}/${{ matrix.image_name }}:amd64-${{ github.ref_name }} \
              ${{ env.REGISTRY }}/${{ matrix.image_name }}:arm64-${{ github.ref_name }}
          done

  publish-github-release:
    name: Publish GitHub Release
    runs-on: ubuntu-latest
    needs:
      - publish-ios
      - publish-npm
      - publish-image-manifests
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Download CLI release artifacts
        uses: actions/download-artifact@v8
        with:
          name: cli-release
          path: cli-release

      - name: Download CLI npm package
        uses: actions/download-artifact@v8
        with:
          name: cli-npm-package
          path: cli-npm-package

      - name: Download OpenClaw plugin npm package
        uses: actions/download-artifact@v8
        with:
          name: openclaw-plugin-npm-package
          path: openclaw-plugin-npm-package

      - name: Generate CLI checksums
        run: |
          cd cli-release
          shasum -a 256 ./*.tar.gz > checksums.txt

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          generate_release_notes: true
          files: |
            cli-release/cowtail-darwin-arm64.tar.gz
            cli-release/cowtail-darwin-x64.tar.gz
            cli-release/cowtail-linux-arm64.tar.gz
            cli-release/cowtail-linux-x64.tar.gz
            cli-release/checksums.txt
            cli-npm-package/*.tgz
            openclaw-plugin-npm-package/*.tgz

  deploy-convex:
    name: Deploy Convex
    needs: [publish-github-release]
    uses: ./.github/workflows/convex-deploy.yml
    secrets: inherit
