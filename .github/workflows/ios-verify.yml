name: iOS Verify

on:
  workflow_call:
  push:
    branches:
      - "main"
    paths:
      - "package.json"
      - "bun.lock"
      - "protocol/**"
      - "ios/**"
      - ".github/workflows/ios-build.yml"
      - ".github/workflows/ios-verify.yml"
      - ".github/workflows/release.yml"
  pull_request:
    branches:
      - "main"
    paths:
      - "package.json"
      - "bun.lock"
      - "protocol/**"
      - "ios/**"
      - ".github/workflows/ios-build.yml"
      - ".github/workflows/ios-verify.yml"
      - ".github/workflows/release.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  verify:
    name: iOS Verify
    if: >
      github.event_name == 'push' ||
      (
        github.event_name == 'workflow_dispatch' &&
        (github.actor == 'kiliantyler' || github.actor == 'MaudeBot')
      ) ||
      (
        github.event_name == 'pull_request' &&
        github.event.pull_request.head.repo.full_name == github.repository &&
        (github.actor == 'kiliantyler' || github.actor == 'MaudeBot')
      )
    runs-on: maude-mac
    env:
      COWTAIL_IOS_TEST_DEVICE_NAME: iPhone 17 Pro
      COWTAIL_IOS_TEST_OS: "26.5"
    steps:
      - uses: actions/checkout@v6
      - uses: oven-sh/setup-bun@v2
      - run: bun install --frozen-lockfile

      - name: Write iOS verify project env
        run: install -m 600 ios/Config/project.env.example ios/Config/project.env

      - name: Run SwiftLint
        working-directory: ios
        run: swiftlint lint --strict

      - name: Run SwiftFmt
        working-directory: ios
        run: swiftformat --lint .

      - name: Reset simulator before unit tests
        working-directory: ios
        run: scripts/reset-simulator.sh

      - name: Run iOS Unit Tests
        run: bun run test:ios:unit

      - name: Reset simulator before UI tests
        working-directory: ios
        run: scripts/reset-simulator.sh

      - name: Run iOS UI Tests
        run: bun run test:ios:ui
