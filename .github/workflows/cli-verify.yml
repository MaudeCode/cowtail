name: CLI Verify

on:
  workflow_call:
    inputs:
      version:
        required: false
        type: string
        default: v0.0.0-dev
  push:
    branches:
      - "main"
    paths:
      - "cli/**"
      - "protocol/**"
      - ".github/workflows/cli-build.yml"
      - ".github/workflows/cli-verify.yml"
      - ".github/workflows/release.yml"
  pull_request:
    branches:
      - "main"
    paths:
      - "cli/**"
      - "protocol/**"
      - ".github/workflows/cli-build.yml"
      - ".github/workflows/cli-verify.yml"
      - ".github/workflows/release.yml"
  workflow_dispatch:

jobs:
  verify:
    name: CLI Verify
    runs-on: blacksmith-4vcpu-ubuntu-2404
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - uses: oven-sh/setup-bun@v2

      - name: Install protocol dependencies
        run: bun install --frozen-lockfile

      - name: Install CLI dependencies
        working-directory: cli
        run: bun install --frozen-lockfile

      - name: Check CLI
        working-directory: cli
        run: bun run check

      - name: Verify version command
        working-directory: cli
        env:
          COWTAIL_VERSION: ${{ inputs.version || 'v0.0.0-dev' }}
        run: |
          bun run build:js
          test "$(node ./dist/cowtail.js version)" = "${COWTAIL_VERSION}"
