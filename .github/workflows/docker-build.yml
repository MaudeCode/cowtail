name: Docker Build

on:
  workflow_call:
    inputs:
      version:
        required: false
        type: string
        default: dev
      dockerfile:
        required: false
        type: string
        default: web/Dockerfile
      artifact_prefix:
        required: false
        type: string
        default: docker
      image_name:
        required: false
        type: string
        default: cowtail

permissions:
  contents: read

jobs:
  build:
    name: Build (${{ matrix.platform }})
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: true
      matrix:
        include:
          - platform: linux/amd64
            arch: amd64
            runner: blacksmith-4vcpu-ubuntu-2404
          - platform: linux/arm64
            arch: arm64
            runner: blacksmith-4vcpu-ubuntu-2404-arm
    steps:
      - uses: actions/checkout@v6

      - name: Setup Blacksmith Builder
        uses: useblacksmith/setup-docker-builder@v1

      - name: Build image
        uses: useblacksmith/build-push-action@v2
        with:
          context: .
          file: ${{ inputs.dockerfile }}
          tags: local/${{ inputs.image_name }}:${{ matrix.arch }}-${{ inputs.version }}
          build-args: |
            COWTAIL_VERSION=${{ inputs.version }}
          platforms: ${{ matrix.platform }}
          outputs: type=docker,dest=/tmp/image.tar

      - name: Upload image artifact
        uses: actions/upload-artifact@v7
        with:
          name: ${{ inputs.artifact_prefix }}-${{ matrix.arch }}
          path: /tmp/image.tar
          retention-days: 1
