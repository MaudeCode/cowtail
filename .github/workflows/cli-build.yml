name: CLI Build

on:
  workflow_call:
    inputs:
      version:
        required: false
        type: string
        default: v0.0.0-dev
      upload_artifacts:
        required: false
        type: boolean
        default: true

permissions:
  contents: read

jobs:
  build:
    name: Build CLI Release Artifacts
    runs-on: blacksmith-4vcpu-ubuntu-2404
    steps:
      - uses: actions/checkout@v6

      - uses: oven-sh/setup-bun@v2

      - name: Install protocol dependencies
        run: bun install --frozen-lockfile

      - name: Install CLI dependencies
        working-directory: cli
        run: bun install --frozen-lockfile

      - name: Build release binary
        working-directory: cli
        env:
          COWTAIL_VERSION: ${{ inputs.version }}
        run: |
          rm -rf release
          mkdir -p release

          for target in \
            "bun-darwin-arm64:cowtail-darwin-arm64" \
            "bun-darwin-x64:cowtail-darwin-x64" \
            "bun-linux-arm64:cowtail-linux-arm64" \
            "bun-linux-x64:cowtail-linux-x64"
          do
            build_target="${target%%:*}"
            asset_name="${target##*:}"
            asset_dir="./release/${asset_name}"

            mkdir -p "${asset_dir}"
            bun build ./src/cli.ts \
              --compile \
              --target="${build_target}" \
              --env='COWTAIL_*' \
              --outfile "${asset_dir}/cowtail"

            tar -C "${asset_dir}" -czf "./release/${asset_name}.tar.gz" cowtail
          done

      - name: Set npm package version from tag
        working-directory: cli
        run: |
          node <<'NODE'
          const fs = require("node:fs");

          const version = process.env.GITHUB_REF_NAME?.replace(/^v/, "") || "${{ inputs.version }}".replace(/^v/, "");
          const packageJsonPath = "package.json";
          const packageJson = JSON.parse(fs.readFileSync(packageJsonPath, "utf8"));
          packageJson.version = version;
          fs.writeFileSync(packageJsonPath, `${JSON.stringify(packageJson, null, 2)}\n`);
          NODE

      - name: Pack CLI npm package
        working-directory: cli
        env:
          COWTAIL_VERSION: ${{ inputs.version }}
        run: |
          bun run build:npm
          npm pack

      - name: Upload CLI artifact
        if: ${{ inputs.upload_artifacts }}
        uses: actions/upload-artifact@v7
        with:
          name: cli-release
          path: cli/release/*.tar.gz
          retention-days: 1

      - name: Upload CLI npm artifact
        if: ${{ inputs.upload_artifacts }}
        uses: actions/upload-artifact@v7
        with:
          name: cli-npm-package
          path: cli/*.tgz
          retention-days: 1
