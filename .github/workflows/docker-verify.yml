name: Docker Verify

on:
  push:
    branches:
      - "main"
    paths:
      - ".dockerignore"
      - "Dockerfile"
      - "package.json"
      - "bun.lock"
      - "protocol/**"
      - "web/**"
      - ".github/workflows/docker-build.yml"
      - ".github/workflows/docker-verify.yml"
      - ".github/workflows/release.yml"
  pull_request:
    branches:
      - "main"
    paths:
      - ".dockerignore"
      - "Dockerfile"
      - "package.json"
      - "bun.lock"
      - "protocol/**"
      - "web/**"
      - ".github/workflows/docker-build.yml"
      - ".github/workflows/docker-verify.yml"
      - ".github/workflows/release.yml"
  workflow_dispatch:

jobs:
  docker-build:
    uses: ./.github/workflows/docker-build.yml
