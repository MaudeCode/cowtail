name: Docker Verify

on:
  push:
    branches:
      - "main"
    paths:
      - ".dockerignore"
      - "web/Dockerfile"
      - "package.json"
      - "bun.lock"
      - "protocol/**"
      - "realtime/**"
      - "web/**"
      - ".github/workflows/docker-build.yml"
      - ".github/workflows/docker-verify.yml"
      - ".github/workflows/release.yml"
  pull_request:
    branches:
      - "main"
    paths:
      - ".dockerignore"
      - "web/Dockerfile"
      - "package.json"
      - "bun.lock"
      - "protocol/**"
      - "realtime/**"
      - "web/**"
      - ".github/workflows/docker-build.yml"
      - ".github/workflows/docker-verify.yml"
      - ".github/workflows/release.yml"
  workflow_dispatch:

jobs:
  web-docker-build:
    uses: ./.github/workflows/docker-build.yml

  realtime-docker-build:
    uses: ./.github/workflows/docker-build.yml
    with:
      dockerfile: realtime/Dockerfile
      artifact_prefix: realtime-docker
      image_name: cowtail-realtime
