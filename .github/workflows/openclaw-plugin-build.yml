name: OpenClaw Plugin Build

on:
  workflow_call:
    inputs:
      version:
        required: false
        type: string
        default: v0.0.0-dev
      upload_artifacts:
        required: false
        type: boolean
        default: true

permissions:
  contents: read

jobs:
  build:
    name: Build OpenClaw plugin npm package
    runs-on: blacksmith-4vcpu-ubuntu-2404
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: "22"

      - uses: oven-sh/setup-bun@v2

      - name: Install root dependencies
        run: bun install --frozen-lockfile

      - name: Install OpenClaw plugin dependencies
        working-directory: openclaw-plugin
        run: bun install --frozen-lockfile

      - name: Set OpenClaw plugin package version
        working-directory: openclaw-plugin
        env:
          PACKAGE_VERSION: ${{ inputs.version }}
        run: |
          node <<'NODE'
          const fs = require("node:fs");

          const version = process.env.PACKAGE_VERSION.replace(/^v/, "");
          const packageJsonPath = "package.json";
          const packageJson = JSON.parse(fs.readFileSync(packageJsonPath, "utf8"));
          packageJson.version = version;
          fs.writeFileSync(packageJsonPath, `${JSON.stringify(packageJson, null, 2)}\n`);
          NODE

      - name: Build OpenClaw plugin npm package
        working-directory: openclaw-plugin
        run: bun run build

      - name: Pack OpenClaw plugin npm tarball
        working-directory: openclaw-plugin
        run: npm pack

      - name: Upload OpenClaw plugin npm artifact
        if: ${{ inputs.upload_artifacts }}
        uses: actions/upload-artifact@v7
        with:
          name: openclaw-plugin-npm-package
          path: openclaw-plugin/*.tgz
          retention-days: 1
