name: Cowtail
options:
  minimumXcodeGenVersion: 2.38.0
  deploymentTarget:
    iOS: "26.0"
settings:
  base:
    DEVELOPMENT_TEAM: ${COWTAIL_DEVELOPMENT_TEAM}
    ENABLE_USER_SCRIPT_SANDBOXING: YES
    STRING_CATALOG_GENERATE_SYMBOLS: YES
    COWTAIL_PUBLIC_SITE_URL: ${COWTAIL_PUBLIC_SITE_URL}
    COWTAIL_CONVEX_QUERY_URL: ${COWTAIL_CONVEX_QUERY_URL}
    COWTAIL_HEALTH_SUMMARY_URL: ${COWTAIL_HEALTH_SUMMARY_URL}
    COWTAIL_ALERT_WRITE_URL: ${COWTAIL_ALERT_WRITE_URL}
    COWTAIL_AUTH_SESSION_URL: ${COWTAIL_AUTH_SESSION_URL}
    COWTAIL_NOTIFICATION_PREFERENCES_URL: ${COWTAIL_NOTIFICATION_PREFERENCES_URL}
    COWTAIL_PUSH_REGISTRATION_URL: ${COWTAIL_PUSH_REGISTRATION_URL}
    COWTAIL_PUSH_UNREGISTRATION_URL: ${COWTAIL_PUSH_UNREGISTRATION_URL}
    COWTAIL_ROUNDUP_TIMEZONE: ${COWTAIL_ROUNDUP_TIMEZONE}
configs:
  Debug: debug
  Release: release
packages:
  SwiftOpenAPIRuntime:
    url: https://github.com/apple/swift-openapi-runtime
    from: 1.9.0
  SwiftOpenAPIURLSession:
    url: https://github.com/apple/swift-openapi-urlsession
    from: 1.1.0
targets:
  Cowtail:
    type: application
    platform: iOS
    deploymentTarget: "26.0"
    info:
      path: CowtailApp/Resources/Info.plist
      properties:
        CFBundleDisplayName: Cowtail
        CFBundleShortVersionString: 0.1.0
        CFBundleVersion: "1"
        CowtailPublicSiteURL: $(COWTAIL_PUBLIC_SITE_URL)
        CowtailConvexQueryURL: $(COWTAIL_CONVEX_QUERY_URL)
        CowtailHealthSummaryURL: $(COWTAIL_HEALTH_SUMMARY_URL)
        CowtailAlertWriteURL: $(COWTAIL_ALERT_WRITE_URL)
        CowtailAuthSessionURL: $(COWTAIL_AUTH_SESSION_URL)
        CowtailNotificationPreferencesURL: $(COWTAIL_NOTIFICATION_PREFERENCES_URL)
        CowtailPushRegistrationURL: $(COWTAIL_PUSH_REGISTRATION_URL)
        CowtailPushUnregistrationURL: $(COWTAIL_PUSH_UNREGISTRATION_URL)
        CowtailRoundupTimeZone: $(COWTAIL_ROUNDUP_TIMEZONE)
        UIAppFonts:
          - SpaceGrotesk-Regular.ttf
          - SpaceGrotesk-Medium.ttf
          - SpaceGrotesk-Bold.ttf
          - DMMono-Regular.ttf
          - DMMono-Medium.ttf
        UIApplicationSceneManifest:
          UIApplicationSupportsMultipleScenes: true
        UILaunchScreen: {}
    sources:
      - path: CowtailApp/Sources
      - path: CowtailApp/Resources
    dependencies:
      - package: SwiftOpenAPIRuntime
        product: OpenAPIRuntime
      - package: SwiftOpenAPIURLSession
        product: OpenAPIURLSession
    preBuildScripts:
      - script: |
          #!/usr/bin/env sh
          set -eu

          /bin/sh "${SRCROOT}/scripts/sync-openapi.sh"
        name: Sync OpenAPI
        basedOnDependencyAnalysis: false
        showEnvVars: false
    settings:
      base:
        PRODUCT_NAME: Cowtail
        PRODUCT_BUNDLE_IDENTIFIER: ${COWTAIL_PRODUCT_BUNDLE_IDENTIFIER}
        SWIFT_VERSION: 6.0
        IPHONEOS_DEPLOYMENT_TARGET: 26.0
        TARGETED_DEVICE_FAMILY: 1
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        CODE_SIGN_STYLE: Automatic
        CURRENT_PROJECT_VERSION: 1
        MARKETING_VERSION: 0.1.0
        DEVELOPMENT_ASSET_PATHS: '"CowtailApp/Preview Content"'
        ENABLE_USER_SCRIPT_SANDBOXING: NO
      configs:
        Debug:
          COWTAIL_ASSOCIATED_DOMAIN: ${COWTAIL_ASSOCIATED_DOMAIN_DEBUG}
          CODE_SIGN_ENTITLEMENTS: CowtailApp/Resources/CowtailDebug.entitlements
        Release:
          COWTAIL_ASSOCIATED_DOMAIN: ${COWTAIL_ASSOCIATED_DOMAIN_RELEASE}
          CODE_SIGN_ENTITLEMENTS: CowtailApp/Resources/CowtailRelease.entitlements
    scheme:
      testTargets:
        - CowtailTests
  CowtailTests:
    type: bundle.unit-test
    platform: iOS
    deploymentTarget: "26.0"
    sources:
      - path: CowtailTests
    dependencies:
      - target: Cowtail
    settings:
      base:
        GENERATE_INFOPLIST_FILE: YES
        PRODUCT_BUNDLE_IDENTIFIER: ${COWTAIL_PRODUCT_BUNDLE_IDENTIFIER}.tests
        SWIFT_VERSION: 6.0
