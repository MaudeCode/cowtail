name: Cowtail
options:
  minimumXcodeGenVersion: 2.38.0
  deploymentTarget:
    iOS: "26.0"
settings:
  base:
    DEVELOPMENT_TEAM: ${COWTAIL_DEVELOPMENT_TEAM}
    ENABLE_USER_SCRIPT_SANDBOXING: YES
    STRING_CATALOG_GENERATE_SYMBOLS: YES
    COWTAIL_PUBLIC_SITE_URL: ${COWTAIL_PUBLIC_SITE_URL}
    COWTAIL_CONVEX_QUERY_URL: ${COWTAIL_CONVEX_QUERY_URL}
    COWTAIL_HEALTH_SUMMARY_URL: ${COWTAIL_HEALTH_SUMMARY_URL}
    COWTAIL_ALERT_WRITE_URL: ${COWTAIL_ALERT_WRITE_URL}
    COWTAIL_PUSH_REGISTRATION_URL: ${COWTAIL_PUSH_REGISTRATION_URL}
    COWTAIL_PUSH_UNREGISTRATION_URL: ${COWTAIL_PUSH_UNREGISTRATION_URL}
configs:
  Debug: debug
  Release: release
targets:
  Cowtail:
    type: application
    platform: iOS
    deploymentTarget: "26.0"
    sources:
      - path: CowtailApp/Sources
      - path: CowtailApp/Resources
    settings:
      base:
        PRODUCT_NAME: Cowtail
        PRODUCT_BUNDLE_IDENTIFIER: ${COWTAIL_PRODUCT_BUNDLE_IDENTIFIER}
        SWIFT_VERSION: 6.0
        IPHONEOS_DEPLOYMENT_TARGET: 26.0
        TARGETED_DEVICE_FAMILY: 1
        GENERATE_INFOPLIST_FILE: YES
        INFOPLIST_KEY_CFBundleDisplayName: Cowtail
        INFOPLIST_KEY_CFBundleShortVersionString: 0.1.0
        INFOPLIST_KEY_CFBundleVersion: 1
        INFOPLIST_KEY_CowtailPublicSiteURL: $(COWTAIL_PUBLIC_SITE_URL)
        INFOPLIST_KEY_CowtailConvexQueryURL: $(COWTAIL_CONVEX_QUERY_URL)
        INFOPLIST_KEY_CowtailHealthSummaryURL: $(COWTAIL_HEALTH_SUMMARY_URL)
        INFOPLIST_KEY_CowtailAlertWriteURL: $(COWTAIL_ALERT_WRITE_URL)
        INFOPLIST_KEY_CowtailPushRegistrationURL: $(COWTAIL_PUSH_REGISTRATION_URL)
        INFOPLIST_KEY_CowtailPushUnregistrationURL: $(COWTAIL_PUSH_UNREGISTRATION_URL)
        INFOPLIST_KEY_UIApplicationSceneManifest_Generation: YES
        INFOPLIST_KEY_UILaunchScreen_Generation: YES
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        CODE_SIGN_STYLE: Automatic
        CURRENT_PROJECT_VERSION: 1
        MARKETING_VERSION: 0.1.0
        DEVELOPMENT_ASSET_PATHS: '"CowtailApp/Preview Content"'
      configs:
        Debug:
          COWTAIL_ASSOCIATED_DOMAIN: ${COWTAIL_ASSOCIATED_DOMAIN_DEBUG}
          CODE_SIGN_ENTITLEMENTS: CowtailApp/Resources/CowtailDebug.entitlements
        Release:
          COWTAIL_ASSOCIATED_DOMAIN: ${COWTAIL_ASSOCIATED_DOMAIN_RELEASE}
          CODE_SIGN_ENTITLEMENTS: CowtailApp/Resources/CowtailRelease.entitlements
    scheme:
      testTargets: []
